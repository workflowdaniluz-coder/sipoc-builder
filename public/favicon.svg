<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#16253e"/>

  <!-- Back swoosh -->
  <path d="M3,36 C3,28 14,21 32,21 C50,21 61,28 61,36"
        stroke="#ecbf03" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Left person (white) -->
  <circle cx="14" cy="14" r="7" fill="white"/>
  <path d="M2,29 C2,20 26,20 26,29Z" fill="white"/>

  <!-- Right person (white) -->
  <circle cx="50" cy="14" r="7" fill="white"/>
  <path d="M38,29 C38,20 62,20 62,29Z" fill="white"/>

  <!-- Center person (gold) -->
  <circle cx="32" cy="12" r="9" fill="#ecbf03"/>
  <path d="M18,29 C18,18 46,18 46,29Z" fill="#ecbf03"/>

  <!-- Front swoosh -->
  <path d="M3,36 C3,44 14,51 32,51 C50,51 61,44 61,36"
        stroke="#ecbf03" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Gear (simplified) -->
  <defs>
    <mask id="fm">
      <circle cx="32" cy="56" r="7" fill="white"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(45 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(90 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(135 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(180 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(225 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(270 32 56)"/>
      <rect x="30" y="46" width="4" height="6" rx="1.5" fill="white" transform="rotate(315 32 56)"/>
      <circle cx="32" cy="56" r="3" fill="black"/>
    </mask>
  </defs>
  <rect x="18" y="44" width="28" height="24" fill="white" mask="url(#fm)"/>
